<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>资源导航网站</title>

  <style>
    body {
      font-family: Arial;
      max-width: 800px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .tag {
      font-size: 12px;
      color: white;
      background: #333;
      padding: 2px 6px;
      margin-right: 5px;
      border-radius: 4px;
    }
  </style>

</head>

<body>

<h1>📚 资源导航网站</h1>

<input id="search" placeholder="搜索资源..." oninput="search()" />

<div id="results"></div>

<script>

const data = [
  {
    name: "Google Scholar",
    url: "https://scholar.google.com",
    tags: ["论文", "学术"]
  },
  {
    name: "Internet Archive",
    url: "https://archive.org",
    tags: ["书籍", "资源"]
  },
  {
    name: "JSTOR",
    url: "https://www.jstor.org",
    tags: ["历史", "论文"]
  }
];

function render(list) {
  const results = document.getElementById("results");
  results.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <a href="${item.url}" target="_blank">
        <h3>${item.name}</h3>
      </a>
      <div>
        ${item.tags.map(t => `<span class="tag">${t}</span>`).join("")}
      </div>
    `;

    results.appendChild(div);
  });
}

function search() {
  const keyword = document.getElementById("search").value.toLowerCase();

  const filtered = data.filter(item =>
    item.name.toLowerCase().includes(keyword) ||
    item.tags.join("").toLowerCase().includes(keyword)
  );

  render(filtered);
}

// 初始加载
render(data);

</script>

</body>
</html>
