<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>资源导航系统</title>

  <style>
    body {
      font-family: Arial;
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      justify-content: center;
    }

    .btn {
      padding: 8px 12px;
      border: 1px solid #333;
      cursor: pointer;
      border-radius: 6px;
      background: white;
    }

    .btn.active {
      background: black;
      color: white;
    }

    .subnav {
      margin: 10px 0 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .subbtn {
      padding: 6px 10px;
      border: 1px solid #888;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    .card {
      border: 1px solid #ddd;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .tag {
      font-size: 12px;
      background: #333;
      color: white;
      padding: 2px 6px;
      margin-right: 5px;
      border-radius: 4px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<h1>📚 资源导航系统</h1>

<input id="search" placeholder="搜索资源..." oninput="render()" />

<div class="nav" id="nav"></div>
<div class="subnav" id="subnav"></div>
<div id="results"></div>

<script>

const data = [
  {
    category: "百科索引",
    children: [
      {
        subcategory: "百科网站",
        items: [
          { name: "大英百科全书", url: "https://www.britannica.com/", tags: ["百科"] },
          { name: "Wikipedia", url: "https://www.wikipedia.org/", tags: ["百科"] },
          { name: "Google Scholar", url: "https://scholar.google.com", tags: ["学术"] }
        ]
      }
    ]
  },

  {
    category: "学术论文",
    children: [
      {
        subcategory: "中文",
        items: [
          { name: "中国知网", url: "https://www.cnki.net/", tags: ["论文"] },
          { name: "万方数据库", url: "https://www.wanfangdata.com.cn/", tags: ["论文"] }
        ]
      },
      {
        subcategory: "英文",
        items: [
          { name: "JSTOR", url: "https://www.jstor.org/", tags: ["论文"] },
          { name: "Project MUSE", url: "https://muse.jhu.edu/", tags: ["论文"] },
          { name: "Sci-Hub", url: "https://sci-hub.box/", tags: ["论文"] }
        ]
      }
    ]
  }
];

let currentCategory = data[0];
let currentSub = currentCategory.children[0];

// 渲染主分类
function renderNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";

  data.forEach((c, i) => {
    const btn = document.createElement("div");
    btn.className = "btn" + (c === currentCategory ? " active" : "");
    btn.innerText = c.category;

    btn.onclick = () => {
      currentCategory = c;
      currentSub = c.children[0];
      renderNav();
      renderSub();
      render();
    };

    nav.appendChild(btn);
  });
}

// 渲染子分类
function renderSub() {
  const subnav = document.getElementById("subnav");
  subnav.innerHTML = "";

  currentCategory.children.forEach(sub => {
    const btn = document.createElement("div");
    btn.className = "subbtn";
    btn.innerText = sub.subcategory;

    btn.onclick = () => {
      currentSub = sub;
      render();
    };

    subnav.appendChild(btn);
  });
}

// 渲染资源
function render() {
  const keyword = document.getElementById("search").value.toLowerCase();
  const results = document.getElementById("results");
  results.innerHTML = "";

  let items = currentSub.items;

  if (keyword) {
    items = items.filter(i =>
      i.name.toLowerCase().includes(keyword) ||
      i.tags.join("").toLowerCase().includes(keyword)
    );
  }

  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <a href="${item.url}" target="_blank">
        <h3>${item.name}</h3>
      </a>
      ${item.tags.map(t => `<span class="tag">${t}</span>`).join("")}
    `;

    results.appendChild(div);
  });
}

renderNav();
renderSub();
render();

</script>

</body>
</html>
