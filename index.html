<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>这是一个历史学工具盒</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* 左侧 */
#sidebar {
  width: 260px;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid #ddd;
  padding: 10px;
}

#sidebar div {
  cursor: pointer;
  padding: 6px;
}

#sidebar div:hover {
  background: #f0f0f0;
}

/* 主体 */
#main {
  flex: 1;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

/* 树 */
.node-title {
  cursor: pointer;
  font-weight: bold;
  margin: 6px 0;
}

.node-content {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
  margin-left: 15px;
}

/* 链接 */
a {
  display: block;
  margin: 4px 0;
  color: #1a73e8;
  text-decoration: none;
}

/* 收藏 */
.star {
  cursor: pointer;
  margin-right: 6px;
  color: gold;
}

/* 高亮 */
mark {
  background: yellow;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
  <h1>📚 历史学工具盒</h1>
  <input id="search" placeholder="搜索资源..." oninput="render()" />
  <div id="app"></div>
</div>

<script>

let data = [];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

function getKey() {
  return document.getElementById("search").value.toLowerCase();
}

function toggleFav(name, url) {
  const i = favorites.findIndex(f => f.url === url);
  if (i > -1) favorites.splice(i, 1);
  else favorites.push({ name, url });

  localStorage.setItem("fav", JSON.stringify(favorites));
  render();
}

function isFav(url) {
  return favorites.some(f => f.url === url);
}

function highlight(text, key) {
  if (!key) return text;
  return text.replaceAll(key, `<mark>${key}</mark>`);
}

/* 树结构 */
function createNode(node) {
  const div = document.createElement("div");

  const title = document.createElement("div");
  title.className = "node-title";
  title.innerText = "📁 " + (node.category || node.subcategory);

  const content = document.createElement("div");
  content.className = "node-content";

  title.onclick = () => {
    content.style.maxHeight =
      content.style.maxHeight ? null : content.scrollHeight + "px";
  };

  const key = getKey();

  if (node.items) {
    node.items.forEach(i => {
      if (key && !i.name.toLowerCase().includes(key)) return;

      const row = document.createElement("div");

      const star = document.createElement("span");
      star.className = "star";
      star.innerText = isFav(i.url) ? "⭐" : "☆";

      star.onclick = () => toggleFav(i.name, i.url);

      const a = document.createElement("a");
      a.href = i.url;
      a.target = "_blank";
      a.innerHTML = highlight(i.name, key);

      row.appendChild(star);
      row.appendChild(a);

      content.appendChild(row);
    });
  }

  if (node.children) {
    node.children.forEach(c => {
      content.appendChild(createNode(c));
    });
  }

  div.appendChild(title);
  div.appendChild(content);

  return div;
}

/* 渲染 */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (!data.length) return;

  data.forEach(d => {
    app.appendChild(createNode(d));
  });
}

/* 左侧导航 */
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "<b>📂 导航</b>";

  data.forEach(d => {
    const item = document.createElement("div");
    item.innerText = d.category;

   item.onclick = () => {
  app.innerHTML = "";
  render(); // 直接渲染整棵树
};
    sb.appendChild(item);
  });
}

/* 加载 JSON */
fetch("./data.json")
  .then(res => {
    if (!res.ok) throw new Error("加载失败");
    return res.json();
  })
  .then(json => {
    data = json;
    renderSidebar();
    render();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML =
      "<p style='color:red'>data.json加载失败</p>";
  });

</script>

</body>
</html>
