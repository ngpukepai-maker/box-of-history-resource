<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>这是一个历史学工具盒</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* 左侧导航 */
#sidebar {
  width: 260px;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid #ddd;
  padding: 10px;
}

#sidebar div {
  cursor: pointer;
  padding: 6px;
}

#sidebar div:hover {
  background: #f0f0f0;
}

/* 主体 */
#main {
  flex: 1;
  padding: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

/* 节点 */
.node-title {
  cursor: pointer;
  font-weight: bold;
  margin: 6px 0;
}

.node-content {
  margin-left: 15px;
  display: none;
}

/* 链接 */
a {
  display: block;
  margin: 4px 0;
  color: #1a73e8;
  text-decoration: none;
}

/* 收藏 */
.star {
  cursor: pointer;
  margin-right: 6px;
  color: gold;
}

/* 高亮 */
mark {
  background: yellow;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
  <h1>📚 历史学工具盒</h1>
  <input id="search" placeholder="搜索资源..." oninput="renderRoot()" />
  <div id="app"></div>
</div>

<script>

let data = [];
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

/* 获取搜索 */
function getKey() {
  return document.getElementById("search").value.toLowerCase();
}

/* 收藏 */
function toggleFav(name, url) {
  const i = favorites.findIndex(f => f.url === url);
  if (i > -1) favorites.splice(i, 1);
  else favorites.push({ name, url });

  localStorage.setItem("fav", JSON.stringify(favorites));
  renderRoot();
}

function isFav(url) {
  return favorites.some(f => f.url === url);
}

/* 高亮 */
function highlight(text, key) {
  if (!key) return text;
  return text.replaceAll(key, `<mark>${key}</mark>`);
}

/* =========================
   核心：递归树（稳定版）
========================= */
function createNode(node) {
  const div = document.createElement("div");

  const title = document.createElement("div");
  title.className = "node-title";
  title.innerText = "📁 " + (node.category || node.subcategory);

  const content = document.createElement("div");
  content.className = "node-content";

  /* 点击展开/收起 */
  title.onclick = () => {
    content.style.display =
      content.style.display === "block" ? "none" : "block";
  };

  const key = getKey();

  /* items */
  if (node.items) {
    node.items.forEach(i => {
      if (key && !i.name.toLowerCase().includes(key)) return;

      const row = document.createElement("div");

      const star = document.createElement("span");
      star.className = "star";
      star.innerText = isFav(i.url) ? "⭐" : "☆";

      star.onclick = () => toggleFav(i.name, i.url);

      const a = document.createElement("a");
      a.href = i.url;
      a.target = "_blank";
      a.innerHTML = highlight(i.name, key);

      row.appendChild(star);
      row.appendChild(a);

      content.appendChild(row);
    });
  }

  /* children（无限递归） */
  if (node.children) {
    node.children.forEach(child => {
      content.appendChild(createNode(child));
    });
  }

  div.appendChild(title);
  div.appendChild(content);

  return div;
}

/* =========================
   渲染当前视图（不会清空重绘全树）
========================= */
function renderRoot() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  const key = getKey();

  data.forEach(d => {
    app.appendChild(createNode(d));
  });
}

/* =========================
   左侧导航（只切大类）
========================= */
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "<b>📂 导航</b>";

  data.forEach(d => {
    const item = document.createElement("div");
    item.innerText = d.category;

    item.onclick = () => {
      const app = document.getElementById("app");
      app.innerHTML = "";
      app.appendChild(createNode(d));
    };

    sb.appendChild(item);
  });
}

/* =========================
   加载 JSON
========================= */
fetch("./data.json")
  .then(res => {
    if (!res.ok) throw new Error("data.json加载失败");
    return res.json();
  })
  .then(json => {
    data = json;
    renderSidebar();
    renderRoot();
  })
  .catch(err => {
    console.error(err);
    document.getElementById("app").innerHTML =
      "<p style='color:red'>data.json加载失败</p>";
  });

</script>

</body>
</html>
