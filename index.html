<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>这是一个历史学工具盒</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
}

/* 左侧导航 */
#sidebar {
  width: 250px;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid #ddd;
  padding: 10px;
}

#sidebar div {
  cursor: pointer;
  padding: 6px;
}

#sidebar div:hover {
  background: #f0f0f0;
}

/* 主内容 */
#main {
  flex: 1;
  padding: 20px;
}

/* 标题 */
h1 {
  margin-top: 0;
}

/* 搜索 */
input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}

/* 节点 */
.node-title {
  cursor: pointer;
  font-weight: bold;
  margin: 6px 0;
}

/* 动画折叠 */
.node-content {
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.3s ease;
  margin-left: 15px;
}

/* 链接 */
a {
  display: block;
  margin: 4px 0;
  color: #1a73e8;
  text-decoration: none;
}

/* 收藏 */
.star {
  cursor: pointer;
  margin-left: 6px;
  color: gold;
}

/* 高亮 */
mark {
  background: yellow;
}
</style>
</head>

<body>

<!-- 左侧 -->
<div id="sidebar"></div>

<!-- 主内容 -->
<div id="main">

<h1>📚 这是一个历史学工具盒</h1>

<input id="search" placeholder="搜索资源..." oninput="render()" />

<div id="app"></div>

</div>

<script>

const data = [/* 你的原 data 直接放这里（不改） */];

// 收藏数据
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

// 搜索
function getKey() {
  return document.getElementById("search").value.toLowerCase();
}

// ⭐ 收藏
function toggleFav(name, url) {
  const index = favorites.findIndex(f => f.url === url);
  if (index > -1) favorites.splice(index, 1);
  else favorites.push({ name, url });

  localStorage.setItem("fav", JSON.stringify(favorites));
  render();
}

// ⭐ 是否收藏
function isFav(url) {
  return favorites.some(f => f.url === url);
}

// 🔥 高亮
function highlight(text, key) {
  if (!key) return text;
  return text.replaceAll(key, `<mark>${key}</mark>`);
}

// 🔥 递归树
function createNode(node) {
  const div = document.createElement("div");

  const title = document.createElement("div");
  title.className = "node-title";
  title.innerText = "📁 " + (node.category || node.subcategory || "节点");

  const content = document.createElement("div");
  content.className = "node-content";

  title.onclick = () => {
    if (content.style.maxHeight) {
      content.style.maxHeight = null;
    } else {
      content.style.maxHeight = content.scrollHeight + "px";
    }
  };

  const key = getKey();

  // items
  if (node.items) {
    node.items.forEach(i => {

      if (key &&
        !i.name.toLowerCase().includes(key)
      ) return;

      const row = document.createElement("div");

      const star = document.createElement("span");
      star.className = "star";
      star.innerText = isFav(i.url) ? "⭐" : "☆";

      star.onclick = () => toggleFav(i.name, i.url);

      const a = document.createElement("a");
      a.href = i.url;
      a.target = "_blank";
      a.innerHTML = highlight(i.name, key);

      row.appendChild(star);
      row.appendChild(a);

      content.appendChild(row);
    });
  }

  // children（递归）
  if (node.children) {
    node.children.forEach(child => {
      content.appendChild(createNode(child));
    });
  }

  div.appendChild(title);
  div.appendChild(content);

  return div;
}

// 左侧导航
function renderSidebar() {
  const sb = document.getElementById("sidebar");
  sb.innerHTML = "<b>📂 导航</b>";

  data.forEach(d => {
    const item = document.createElement("div");
    item.innerText = d.category;

    item.onclick = () => {
      document.getElementById("app").innerHTML = "";
      document.getElementById("app").appendChild(createNode(d));
    };

    sb.appendChild(item);
  });
}

// 主渲染
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(d => {
    app.appendChild(createNode(d));
  });
}

renderSidebar();
render();

</script>

</body>
</html>
